<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard & Live Chat</title>
    <link rel="stylesheet" href="style.css?v=1.4">
</head>
<body>

    <header class="dashboard-header">
        <h1 class="main-title">DASHBOARD</h1>
        <div class="tab-navigation">
            <button class="tab-btn active" onclick="switchView('schedule')">Schedule</button>
            <button class="tab-btn" onclick="switchView('chat')">Live Chat</button>
            <button class="tab-btn logout" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <main class="dashboard-view">
        
        <section id="schedule-view" class="day-section">
            <h2 class="day-title">Weekly Tasks & Schedule</h2>
            
            <div class="controls">
                <button class="btn btn-add" onclick="addNewRow()">Add Row</button>
                <button class="btn btn-del" onclick="deleteLastRow()">Delete Row</button>
                <button class="btn btn-add" onclick="addNewDayColumn()">Add Day</button>
                <button class="btn btn-del" onclick="removeLastDayColumn()">Remove Day</button>
            </div>

            <div class="table-container">
                <table id="schedule-table">
                    <thead>
                        <tr id="table-header-row">
                            <th>Time / Task</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="chat-view" class="chat-wrapper" style="display: none;">
            <div class="chat-messages" id="chat-messages-container">
                </div>
            
            <div class="reply-preview-bar" id="reply-bar" style="display: none;">
                <div class="reply-preview-content">
                    <span class="reply-label">Replying to:</span>
                    <span class="reply-text-snippet" id="reply-snippet">...</span>
                </div>
                <button class="cancel-reply-btn" onclick="cancelReply()">✕</button>
            </div>

            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
