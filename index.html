<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Redflag Build</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <header class="dashboard-header">
        <h1 class="main-title">REDFLAG BUILD</h1>
        <div class="tab-navigation">
            <button id="nav-schedule-btn" class="tab-btn active" onclick="switchView('schedule', this)">Schedule</button>
            <button id="nav-chat-btn" class="tab-btn" onclick="switchView('chat', this)">Live Chat</button>
            <button id="nav-logout-btn" class="tab-btn logout" onclick="handleLogout()">Logout</button>
        </div>
    </header>

    <main class="dashboard-view">
        
        <section id="schedule-view" class="day-section">
            <h2 class="day-title">Weekly Tasks & Schedule</h2>
            
            <div id="dynamic-tables-container"></div>

            <div class="bottom-controls" style="margin-top: 30px; text-align: center;">
                <button id="add-day-btn" class="btn btn-add-day" style="background-color: #ff1a1a; color: #fff; padding: 10px 20px;" onclick="addNewDayTable()">Add Day</button>
            </div>
        </section>

        <section id="chat-view" class="chat-wrapper" style="display: none; flex-direction: column;">
            <div class="chat-messages" id="chat-messages-container"></div>
            
            <div class="reply-preview-bar" id="reply-bar" style="display: none;">
                <div class="reply-preview-content">
                    <span class="reply-label">Replying to: </span>
                    <span class="reply-text-snippet" id="reply-snippet">...</span>
                </div>
                <button class="cancel-reply-btn" onclick="cancelReply()">✕</button>
            </div>

            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message...">
                <button id="send-msg-btn" onclick="sendMessage()">Send</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
